<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="popup-container">
      <div class="header">
        <img src="../icons/icon48.png" style="width: 24px; height: 24px; object-fit: contain; border-radius: 4px;" alt="logo" />
        <h3>SOPIA</h3>
      </div>
      
      <div class="content">
        <p class="description">Write graduate statements of purpose with real-time scoring, structures, and AI feedback.</p>
        
        <div class="status-box">
          <span class="dot"></span>
          <span class="status-text">Supported Sites: Google Docs & CommonApp</span>
        </div>

        <button id="open-site" class="btn btn-primary">
          🚀 Open Web Dashboard
        </button>
        
        <button id="inject-sidebar" class="btn btn-secondary">
          ⚡ Toggle Sidebar in Editor
        </button>
      </div>
      
      <div class="footer">
        SOPIA v1.0.0 (Manifest V3)
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
